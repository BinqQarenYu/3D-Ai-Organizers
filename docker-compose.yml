version: '3.8'

services:
  backend:
    build: .
    ports:
      - "17831:17831"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - SECRET_KEY=super-secret-key
    volumes:
      - ./assets_root:/app/assets_root
    depends_on:
      - mongo

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
